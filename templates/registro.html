{% extends 'base.html' %}
{% block title %}Registro · CineApp{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">🎟️</div>
    <h2>Crear Cuenta</h2>
    <p class="auth-sub">Registrate para comprar tus tiquetes</p>
    <form method="POST">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" name="nombre" placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label>Correo Electronico</label>
        <input type="email" name="email" placeholder="correo@ejemplo.com" required>
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary full">Crear Cuenta</button>
    </form>
    <p class="auth-link">Ya tienes cuenta? <a href="{{ url_for('login_view') }}">Inicia sesion</a></p>
  </div>
</div>
{% endblock %}
