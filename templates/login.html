{% extends 'base.html' %}
{% block title %}Iniciar Sesion · CineApp{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">🎬</div>
    <h2>Bienvenido</h2>
    <p class="auth-sub">Inicia sesion para comprar tus tiquetes</p>
    <form method="POST">
      <div class="form-group">
        <label>Correo Electronico</label>
        <input type="email" name="email" placeholder="correo@ejemplo.com" required>
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary full">Iniciar Sesion</button>
    </form>
    <p class="auth-link">No tienes cuenta? <a href="{{ url_for('registro') }}">Registrate</a></p>
    <div class="admin-hint">
      <small>Admin: admin@cine.com / admin123</small>
    </div>
  </div>
</div>
{% endblock %}
