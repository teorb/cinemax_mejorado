{% extends 'base.html' %}
{% block title %}{% if pelicula %}Editar{% else %}Nueva{% endif %} Pelicula · CineApp{% endblock %}
{% block content %}
<div class="form-page">
  <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Volver</a>
  <div class="form-header">
    <h2>{% if pelicula %}Editar Pelicula{% else %}Nueva Pelicula{% endif %}</h2>
  </div>
  <div class="form-card">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Titulo</label>
          <input type="text" name="titulo" value="{{ pelicula.titulo if pelicula else '' }}" required>
        </div>
        <div class="form-group">
          <label>Genero</label>
          <select name="genero">
            {% for g in ['Accion','Comedia','Drama','Terror','Animacion','Ciencia Ficcion','Romance','Thriller'] %}
            <option {% if pelicula and pelicula.genero == g %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Duracion (minutos)</label>
          <input type="number" name="duracion" value="{{ pelicula.duracion if pelicula else '' }}" required>
        </div>
        <div class="form-group">
          <label>Clasificacion</label>
          <select name="clasificacion">
            {% for c in ['G','PG','PG-13','+13','+16','+18','R'] %}
            <option {% if pelicula and pelicula.clasificacion == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Descripcion</label>
        <textarea name="descripcion" rows="3">{{ pelicula.descripcion if pelicula else '' }}</textarea>
      </div>
      <div class="form-group">
        <label>URL de Imagen (poster)</label>
        <input type="text" name="imagen_url" value="{{ pelicula.imagen_url if pelicula else '' }}" placeholder="https://...">
      </div>
      {% if pelicula %}
      <div class="form-group">
        <label>Estado</label>
        <select name="estado">
          <option {% if pelicula.estado=='activa' %}selected{% endif %}>activa</option>
          <option {% if pelicula.estado=='inactiva' %}selected{% endif %}>inactiva</option>
        </select>
      </div>
      {% endif %}
      <button type="submit" class="btn-primary full">Guardar</button>
    </form>
  </div>
</div>
{% endblock %}
