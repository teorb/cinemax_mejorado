{% extends 'base.html' %}
{% block title %}Nueva Funcion · CineApp{% endblock %}
{% block content %}
<div class="form-page">
  <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Volver</a>
  <div class="form-header">
    <h2>Nueva Funcion</h2>
  </div>
  <div class="form-card">
    <form method="POST">
      <div class="form-group">
        <label>Pelicula</label>
        <select name="pelicula_id" required>
          <option value="">Seleccionar pelicula</option>
          {% for p in peliculas %}
          <option value="{{ p.id }}">{{ p.titulo }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" name="fecha" required>
        </div>
        <div class="form-group">
          <label>Hora</label>
          <input type="time" name="hora" required>
        </div>
      </div>
      <div class="form-group">
        <label>Precio por asiento ($)</label>
        <input type="number" name="precio" min="0" step="0.01" required>
      </div>
      <button type="submit" class="btn-primary full">Crear Funcion</button>
    </form>
  </div>
</div>
{% endblock %}
